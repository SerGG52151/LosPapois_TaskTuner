name: Staging CI/CD

on:
  push:
    branches: [ "staging" ]
  pull_request:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./MtdrSpring/backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Reconstruct Oracle Wallet from Secret
      run: |
        echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 -d > Wallet_TaskTuner.zip
        unzip Wallet_TaskTuner.zip -d .
        # The zip contains the 'wallet/' folder, so it will extract correctly here.

    - name: Build with Maven (Includes Frontend)
      # Treating warnings as errors is disabled to suppress React linting failures in CI
      run: CI=false ./mvnw clean package

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./MtdrSpring/backend
        file: ./MtdrSpring/backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/tasktuner-staging:latest
        build-args: |
          UI_USERNAME=${{ secrets.UI_USERNAME }}
          UI_PASSWORD=${{ secrets.UI_PASSWORD }}
          DB_USER=${{ secrets.DB_USER }}
          DBPASSWORD=${{ secrets.DBPASSWORD }}
          DB_URL=${{ secrets.DB_URL }}
          DRIVER_CLASS_NAME=${{ secrets.DRIVER_CLASS_NAME }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_NAME=${{ secrets.TELEGRAM_BOT_NAME }}
