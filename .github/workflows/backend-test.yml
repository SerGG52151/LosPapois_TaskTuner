name: Integration Test (Spring Boot)

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./MtdrSpring/backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Reconstruct Oracle Wallet from Secret
      run: |
        echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 -d > Wallet_TaskTuner.zip
        unzip Wallet_TaskTuner.zip -d .

    - name: Run Maven Tests
      env:
        # Spring Boot tests require the same environment variables that runtime does
        # because @SpringBootTest attempts to start the application context.
        UI_USERNAME: ${{ secrets.UI_USERNAME }}
        UI_PASSWORD: ${{ secrets.UI_PASSWORD }}
        DB_USER: ${{ secrets.DB_USER }}
        DBPASSWORD: ${{ secrets.DBPASSWORD }}
        DB_URL: ${{ secrets.DB_URL }}
        DRIVER_CLASS_NAME: ${{ secrets.DRIVER_CLASS_NAME }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_BOT_NAME: ${{ secrets.TELEGRAM_BOT_NAME }}
      run: ./mvnw test
